    defaultConfig {
        applicationId "com.bycomsolutions.bycomvpn"
        minSdkVersion 28
        targetSdkVersion 34
        versionCode 26
        versionName "2.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables.useSupportLibrary = true

        buildConfigField "Boolean", "USE_ONESIGNAL", "true"
        buildConfigField "String", "ONESIGNAL_APP_ID", "\"f1dbada5-0175-4599-8ff7-195f3125af21\""

        buildConfigField "String", "ENVATO_PURCHASE_CODE", "\"YOUR_CODE(eg-f1dbada5-0175-4599-8ff7-195f3125af21)\""
        buildConfigField "String", "CODESTER_PURCHASE_CODE", "\"YOUR_CODE(eg-LCN1198)\""

        buildConfigField "String", "SHARED_PREFS", "\"BYCOM_SHAREDPREFS\""
        buildConfigField "String", "PREFERENCE_KEY_EXCLUDED_LIST", "\"APPLIST_EXCLUDED\""

