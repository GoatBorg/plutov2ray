name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter pub get
      
      # Gradle'a 'izinleri boşver ve her şeye evet de' komutu
      - name: Make Gradlew Executable
        run: chmod +x android/gradlew
        
      - name: Build APK
        run: flutter build apk --release --no-pub --split-debug-info=build/app/outputs/symbols
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlutoV2Ray-Release
          path: build/app/outputs/flutter-apk/app-release.apk
